<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigator OS — Tier 2</title>
<style>
body { font-family: Arial; margin:0; display:flex }
#sidebar { width:220px; background:#111; color:white; padding:20px }
#sidebar div { margin:10px 0; cursor:pointer }
#main { flex:1; padding:30px }
.view { display:none }
.active { display:block }
.card { background:#f4f4f4; padding:15px; margin-bottom:10px; border-radius:8px }
</style>
</head>
<body>

<div id="sidebar">
  <h3>Navigator</h3>
  <div onclick="openCEO()">👑 CEO View</div>
  <div onclick="openArea()">🏢 Area View</div>
  <div onclick="openUser()">👤 User View</div>
</div>

<div id="main">

  <div id="ceo" class="view active">
    <h1>CEO Dashboard</h1>
    <div id="ceo-data"></div>
  </div>

  <div id="area" class="view">
    <h1>Area Dashboard (HR)</h1>
    <div id="area-data"></div>
  </div>

  <div id="user" class="view">
    <h1>User Dashboard</h1>
    <div id="user-data"></div>
  </div>

</div>

<script>

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function openCEO(){
  switchView('ceo')
  fetch('/data/views/ceo-view.json')
    .then(r=>r.json())
    .then(d=>{
      document.getElementById('ceo-data').innerHTML = `
        <div class="card">Revenue: ${d.revenue}</div>
        <div class="card">Active Clients: ${d.active_clients}</div>
        <div class="card">Alerts: ${d.alerts.join(", ")}</div>
      `
    })
}

function openArea(){
  switchView('area')
  fetch('/data/views/area-hr-view.json')
    .then(r=>r.json())
    .then(d=>{
      document.getElementById('area-data').innerHTML = `
        <div class="card">Active Onboardings: ${d.active_onboardings}</div>
        <div class="card">Blocked Cases: ${d.blocked_cases}</div>
      `
    })
}

function openUser(){
  switchView('user')
  fetch('/data/views/user-view.json')
    .then(r=>r.json())
    .then(d=>{
      document.getElementById('user-data').innerHTML = d.tasks.map(t=>`
        <div class="card">${t.title} — ${t.status}</div>
      `).join('')
    })
}

openCEO()

</script>

</body>
</html>
